# Enable Ollama (default, local)
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.ollama.chat-model.model-id=qwen3.5:0.8b

# Capture requests and responses from the language model
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true

# Set larger timeout for local language models
quarkus.langchain4j.timeout=1m
quarkus.langchain4j.ollama.timeout=1m

# Configure temperature globally for all LLMs
quarkus.langchain4j.temperature=1

# Configure OIDC extension
quarkus.oidc.application-type=hybrid

# Dev Service secret is too short for cookie encryption, so skip it in dev
%dev.quarkus.oidc.token-state-manager.encryption-required=false

# Enforce authentication for all endpoints
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Log REST client request-response
quarkus.rest-client.logging.scope=request-response

# Set conference MCP client
quarkus.langchain4j.mcp.conference.transport-type=http
quarkus.langchain4j.mcp.conference.url=http://localhost:8081/mcp/sse

# EasyRAG watches this folder and ingests on startup
quarkus.langchain4j.easy-rag.path=src/main/resources/rag
quarkus.langchain4j.easy-rag.max-segment-size=100
quarkus.langchain4j.easy-rag.max-overlap-size=25
quarkus.langchain4j.easy-rag.max-results=30

# Use the local ONNX embedding model
quarkus.langchain4j.embedding-model.provider=dev.langchain4j.model.embedding.onnx.bgesmallenq.BgeSmallEnQuantizedEmbeddingModel

# Silence the BGE tokenizer maxLength warning, its 512 default is correct
quarkus.log.category."ai.djl.huggingface.tokenizers.HuggingFaceTokenizer".level=ERROR
