# Unique port
quarkus.http.port=8081

# VULNERABLE BASELINE: the MCP endpoint is NOT protected. Anyone can call it.
# (A later step adds OIDC protection + token propagation.)

# MCP traffic logging so participants can see calls in the console
quarkus.mcp.server.traffic-logging.enabled=true
quarkus.mcp.server.traffic-logging.text-limit=1000

# CORS for the local agent
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8080

# Tests run on a random port to avoid conflicting with the dev-mode server on 8081
quarkus.http.test-port=0

# Hibernate ORM: no schema config needed. With a Postgres dev service, Quarkus
# defaults to drop-and-create in dev and test and runs import.sql on every start,
# so the DB is seeded fresh automatically. The datasource URL is intentionally
# unset so dev services provide Postgres.
